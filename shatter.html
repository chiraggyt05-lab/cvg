<style>
  :root{
    --neon-cyan:#4deaff;
    --neon-magenta:#ff4de8;

  html,body{

    position:fixed; left:0; top:0; width:100%; z-index:10;

    border-radius:14px;

    background:transparent;

    border-radius:10px;
    color:#9aa3c9;
    cursor:pointer;

  .stats .label{
    font-family:'Orbitron',sans-serif; font-size:9px; letter-spacing:2px; color:#7d86b8;

  .controls{
    display:flex; gap:6px; align-items:center; padding:6px;

  .icon-btn{
    width:38px; height:38px;

  .icon-btn:hover{ background:rgba(255,255,255,0.09); color:#fff; }

  .icon-btn.on{ color:var(--neon-cyan); box-shadow:0 0 12px rgba(77,234,255,0.35) inset; }

  .reset-btn{

  .top-right{ display:flex; gap:8px; align-items:flex-start; }

  .hint{
    position:fixed; bottom:22px; left:50%; transform:translateX(-50%);

  .fps{

    .icon-btn{ width:32px; height:32px; font-size:13px; }
    .hint{ font-size:9px; padding:6px 12px; bottom:10px; }

<script>
(function(){
"use strict";

//====================================================================
// UTILITIES
//====================================================================
const rand = (a,b)=> a + Math.random()*(b-a);
const randInt = (a,b)=> Math.floor(rand(a,b+1));
const clamp = (v,a,b)=> Math.max(a,Math.min(b,v));
const lerp = (a,b,t)=> a+(b-a)*t;
const dist2 = (x1,y1,x2,y2)=>{ const dx=x2-x1, dy=y2-y1; return dx*dx+dy*dy; };
const dist = (x1,y1,x2,y2)=> Math.sqrt(dist2(x1,y1,x2,y2));
const easeOutCubic = t => 1-Math.pow(1-t,3);
const easeInOutCubic = t => t<0.5 ? 4*t*t*t : 1-Math.pow(-2*t+2,3)/2;
const TAU = Math.PI*2;

//====================================================================
// AUDIO ENGINE — synthesized, no external files
//====================================================================
class AudioEngine{
  constructor(){
    this.ctx = null;
    this.master = null;
    this.muted = false;
    this._unlocked = false;
  }
  ensure(){
    if(this.ctx) return;

    const AC = window.AudioContext || window.webkitAudioContext;
    this.ctx = new AC();
    this.master = this.ctx.createGain();
    this.master.gain.value = 0.75;
    this.master.connect(this.ctx.destination);
  }
  setMuted(m){
    this.muted = m;
    if(this.master) this.master.gain.value = m?0:0.75;
  }
  _noiseBuffer(duration){
    const ctx=this.ctx;
    const len = Math.max(1, Math.floor(ctx.sampleRate*duration));
    const buf = ctx.createBuffer(1, len, ctx.sampleRate);
    const data = buf.getChannelData(0);
    for(let i=0;i<len;i++){ data[i] = (Math.random()*2-1) * Math.pow(1-i/len, 0.4); }
    return buf;
  }
  playThud(intensity=1){
    this.ensure();
    if(this.muted) return;
    const ctx=this.ctx, t0=ctx.currentTime;
    const osc = ctx.createOscillator();
    osc.type='sine';
    osc.frequency.setValueAtTime(110*intensity+40, t0);
    osc.frequency.exponentialRampToValueAtTime(30, t0+0.18);
    const g = ctx.createGain();
    g.gain.setValueAtTime(0.0001, t0);
    g.gain.exponentialRampToValueAtTime(0.5*clamp(intensity,0.3,1.4), t0+0.008);
    g.gain.exponentialRampToValueAtTime(0.0001, t0+0.22);
    osc.connect(g); g.connect(this.master);
    osc.start(t0); osc.stop(t0+0.24);

    // noise click layer
    const src = ctx.createBufferSource();
    src.buffer = this._noiseBuffer(0.06);
    const nf = ctx.createBiquadFilter();
    nf.type='lowpass'; nf.frequency.value=500;
    const ng = ctx.createGain();
    ng.gain.setValueAtTime(0.25*clamp(intensity,0.3,1.4), t0);
    ng.gain.exponentialRampToValueAtTime(0.0001, t0+0.08);
    src.connect(nf); nf.connect(ng); ng.connect(this.master);
    src.start(t0);
  }
  playGlassBreak(intensity=1){
    this.ensure();
    if(this.muted) return;
    const ctx=this.ctx, t0=ctx.currentTime;
    intensity = clamp(intensity,0.4,1.8);

    // 1) noise crash burst, band-passed high
    const src = ctx.createBufferSource();
    src.buffer = this._noiseBuffer(0.35);
    const bp = ctx.createBiquadFilter();
    bp.type='bandpass'; bp.frequency.value = rand(2200,3800); bp.Q.value=0.7;
    const hp = ctx.createBiquadFilter();
    hp.type='highpass'; hp.frequency.value=1200;
    const ng = ctx.createGain();
    ng.gain.setValueAtTime(0.0001, t0);
    ng.gain.exponentialRampToValueAtTime(0.55*intensity, t0+0.012);
    ng.gain.exponentialRampToValueAtTime(0.0001, t0+0.3+0.1*intensity);
    src.connect(bp); bp.connect(hp); hp.connect(ng); ng.connect(this.master);
    src.start(t0);

    // 2) tinkle shards - short high sine/triangle blips staggered
    const tinkles = Math.round(6+intensity*8);
    for(let i=0;i<tinkles;i++){
      const dt = rand(0,0.28)*Math.pow(i/tinkles,0.5);
      const freq = rand(1800,5200);
      const o = ctx.createOscillator();
      o.type = Math.random()<0.5?'triangle':'sine';
      o.frequency.value = freq;
      o.frequency.exponentialRampToValueAtTime(freq*rand(1.05,1.4), t0+dt+0.06);
      const g = ctx.createGain();
      const vol = 0.09*intensity*rand(0.5,1);
      g.gain.setValueAtTime(0.0001, t0+dt);
      g.gain.exponentialRampToValueAtTime(vol, t0+dt+0.005);
      g.gain.exponentialRampToValueAtTime(0.0001, t0+dt+rand(0.08,0.22));
      o.connect(g); g.connect(this.master);
      o.start(t0+dt); o.stop(t0+dt+0.3);
    }

    // 3) low thump under the crash
    this.playThud(0.7*intensity);
  }
  playChime(){
    this.ensure();
    if(this.muted) return;
    const ctx=this.ctx, t0=ctx.currentTime;
    const notes=[523.25,659.25,783.99,1046.5];
    notes.forEach((f,i)=>{
      const o=ctx.createOscillator();
      o.type='sine'; o.frequency.value=f;
      const g=ctx.createGain();
      const start=t0+i*0.075;
      g.gain.setValueAtTime(0.0001,start);
      g.gain.exponentialRampToValueAtTime(0.22,start+0.02);
      g.gain.exponentialRampToValueAtTime(0.0001,start+0.5);
      o.connect(g); g.connect(this.master);
      o.start(start); o.stop(start+0.55);
    });
  }
  playCrack(){
    this.ensure();
    if(this.muted) return;
    const ctx=this.ctx, t0=ctx.currentTime;
    const src=ctx.createBufferSource();
    src.buffer=this._noiseBuffer(0.05);
    const bp=ctx.createBiquadFilter();
    bp.type='highpass'; bp.frequency.value=3500;
    const g=ctx.createGain();
    g.gain.setValueAtTime(0.15,t0);
    g.gain.exponentialRampToValueAtTime(0.0001,t0+0.06);
    src.connect(bp); bp.connect(g); g.connect(this.master);
    src.start(t0);
  }
  playLaunch(){
    this.ensure();
    if(this.muted) return;
    const ctx=this.ctx, t0=ctx.currentTime;
    const o=ctx.createOscillator();
    o.type='sawtooth';
    o.frequency.setValueAtTime(180,t0);
    o.frequency.exponentialRampToValueAtTime(500,t0+0.09);
    const g=ctx.createGain();
    g.gain.setValueAtTime(0.0001,t0);
    g.gain.exponentialRampToValueAtTime(0.12,t0+0.01);
    g.gain.exponentialRampToValueAtTime(0.0001,t0+0.12);
    o.connect(g); g.connect(this.master);
    o.start(t0); o.stop(t0+0.14);
  }
}

//====================================================================
// PARTICLE (dust / spark) + POOL
//====================================================================
class Particle{
  constructor(){ this.alive=false; }
  spawn(x,y,vx,vy,life,size,color,type,gravity){
    this.x=x; this.y=y; this.vx=vx; this.vy=vy;
    this.life=life; this.maxLife=life;
    this.size=size; this.color=color; this.type=type||'dust';
    this.gravity = gravity!==undefined?gravity:900;
    this.alive=true;
    this.rot = rand(0,TAU);
    this.vrot = rand(-6,6);
  }
  update(dt){
    if(!this.alive) return;
    this.life -= dt;
    if(this.life<=0){ this.alive=false; return; }
    this.vy += this.gravity*dt;
    if(this.type==='spark'){ this.vx *= (1-2.2*dt); this.vy *= (1-1.2*dt); }
    else { this.vx *= (1-0.6*dt); }
    this.x += this.vx*dt;
    this.y += this.vy*dt;
    this.rot += this.vrot*dt;
  }
  draw(ctx){
    if(!this.alive) return;
    const t = this.life/this.maxLife;
    ctx.save();
    ctx.globalAlpha = clamp(t,0,1);
    ctx.translate(this.x,this.y);
    if(this.type==='spark'){
      ctx.rotate(this.rot);
      ctx.strokeStyle = this.color;
      ctx.lineWidth = Math.max(1,this.size*0.4);
      ctx.shadowColor = this.color;
      ctx.shadowBlur = 6;
      ctx.beginPath();
      ctx.moveTo(-this.size,0); ctx.lineTo(this.size,0);
      ctx.stroke();
    } else {
      ctx.fillStyle = this.color;
      ctx.beginPath();
      ctx.arc(0,0,this.size*t*0.8+0.5,0,TAU);
      ctx.fill();
    }
    ctx.restore();
  }
}
class ParticlePool{
  constructor(max){
    this.max=max;
    this.pool=[];
    for(let i=0;i<max;i++) this.pool.push(new Particle());
    this.cursor=0;
  }
  spawn(x,y,vx,vy,life,size,color,type,gravity){
    const p = this.pool[this.cursor];
    this.cursor = (this.cursor+1)%this.max;
    p.spawn(x,y,vx,vy,life,size,color,type,gravity);
  }
  burstDust(x,y,count,color){
    for(let i=0;i<count;i++){
      const a = rand(0,TAU);
      const spd = rand(20,180);
      this.spawn(x,y, Math.cos(a)*spd, Math.sin(a)*spd-60, rand(0.4,1.1), rand(1.5,4), color||'rgba(200,210,255,0.8)','dust', 500);
    }
  }
  burstSparks(x,y,count,color){
    for(let i=0;i<count;i++){
      const a = rand(0,TAU);
      const spd = rand(150,650);
      this.spawn(x,y, Math.cos(a)*spd, Math.sin(a)*spd, rand(0.15,0.4), rand(4,10), color||'#eaf6ff','spark', 700);
    }
  }
  update(dt){ for(const p of this.pool) p.update(dt); }
  draw(ctx){ for(const p of this.pool) p.draw(ctx); }
}

//====================================================================
// FRAGMENT — unified physics body for shards / blocks / pixels
//====================================================================
class Fragment{
  constructor(){ this.alive=false; }
  init(opts){
    this.w = opts.w||0; this.h=opts.h||0;
    this.x = opts.x; this.y = opts.y;
    this.vx = opts.vx||0; this.vy = opts.vy||0;
    this.rotation = opts.rotation||0;
    this.angVel = opts.angVel||0;
    this.color = opts.color || '#bfe9ff';
    this.colorLight = opts.colorLight || opts.color;
    this.mass = opts.mass || 1;
    this.settled = false;
    this.alive = true;
    this.homeX = opts.homeX!==undefined?opts.homeX:this.x;
    this.homeY = opts.homeY!==undefined?opts.homeY:this.y;
    this.life = 1;
    this.spawnScale = 0;
  }
  update(dt, groundY, floorFriction, restitution, gravityScale){
    if(!this.alive) return;
    if(this.spawnScale<1) this.spawnScale = Math.min(1, this.spawnScale + dt*8);
    if(this.settled) return;
    this.vy += 1500*gravityScale*dt;
    this.x += this.vx*dt;
    this.y += this.vy*dt;
    this.rotation += this.angVel*dt;
    this.vx *= (1-0.08*dt);
    this.angVel *= (1-0.5*dt);

    const halfH = this.h/2;
    if(this.y + halfH > groundY){
      this.y = groundY - halfH;
      if(Math.abs(this.vy) > 40){
        this.vy = -this.vy*restitution;
        this.vx *= floorFriction;
        this.angVel *= 0.6;
      } else {
        this.vy = 0;
      }
      this.vx *= floorFriction;
      this.angVel *= floorFriction;
      if(Math.abs(this.vy)<28 && Math.abs(this.vx)<12 && Math.abs(this.angVel)<0.15){
        this.settled = true;
        this.vx=0; this.vy=0; this.angVel=0;
      }
    }
  }
  draw(ctx){
    if(!this.alive) return;
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(this.rotation);
    const s = this.spawnScale;
    ctx.scale(s,s);
    const w=this.w, h=this.h;
    const grad = ctx.createLinearGradient(-w/2,-h/2,w/2,h/2);
    grad.addColorStop(0, this.colorLight);
    grad.addColorStop(1, this.color);
    ctx.fillStyle = grad;
    ctx.fillRect(-w/2,-h/2,w,h);
    ctx.strokeStyle = 'rgba(0,0,0,0.25)';
    ctx.lineWidth=1;
    ctx.strokeRect(-w/2,-h/2,w,h);
    ctx.restore();
  }
}

//====================================================================
// PROJECTILE
//====================================================================
class Projectile{
  constructor(x,y,vx,vy,kind){
    this.x=x; this.y=y; this.vx=vx; this.vy=vy;
    this.radius = kind==='hammer'?16:12;
    this.kind = kind||'ball';
    this.alive=true;
    this.trail=[];
    this.bounces=0;
  }
  update(dt, groundY, w){
    this.vy += 1100*dt;
    this.x += this.vx*dt;
    this.y += this.vy*dt;
    this.trail.push({x:this.x,y:this.y});
    if(this.trail.length>10) this.trail.shift();
    if(this.y+this.radius>groundY){
      this.y = groundY-this.radius;
      this.vy *= -0.45;
      this.vx *= 0.7;
      this.bounces++;
      if(Math.abs(this.vy)<60) this.vy=0;
    }
    if(this.x<-50||this.x>w+50||this.bounces>6) this.alive=false;
  }
  draw(ctx){
    ctx.save();
    for(let i=0;i<this.trail.length;i++){
      const t = this.trail[i];
      ctx.globalAlpha = (i/this.trail.length)*0.35;
      ctx.fillStyle = '#4deaff';
      ctx.beginPath();
      ctx.arc(t.x,t.y,this.radius*(i/this.trail.length)*0.8,0,TAU);
      ctx.fill();
    }
    ctx.globalAlpha=1;
    const grad = ctx.createRadialGradient(this.x-this.radius*0.3,this.y-this.radius*0.3,1,this.x,this.y,this.radius*1.6);
    grad.addColorStop(0,'#ffffff');
    grad.addColorStop(0.4,'#8fe8ff');
    grad.addColorStop(1,'rgba(77,234,255,0.05)');
    ctx.shadowColor='#4deaff';
    ctx.shadowBlur=18;
    ctx.fillStyle=grad;
    ctx.beginPath();
    ctx.arc(this.x,this.y,this.radius,0,TAU);
    ctx.fill();
    ctx.restore();
  }
}

//====================================================================
// BREAKABLE OBJECTS
//====================================================================
class BreakableBase{
  constructor(){ this.broken=false; this.fragments=[]; this.crackT=0; this.cracking=false; }
}

//====================================================================
// GAME
//====================================================================
class Game{
  constructor(){
    this.canvas = document.getElementById('gameCanvas');
    this.ctx = this.canvas.getContext('2d');
    this.audio = new AudioEngine();
    this.particles = new ParticlePool(420);
    this.fragments = [];
    this.fragPool = [];
    this.projectiles = [];
    this.mode = 'gem';
    this.score = 0;
    this.combo = 0;
    this.comboTimer = 0;
    this.timeScale = 1;
    this.slowMoTimer = 0;
    this.shake = 0;
    this.quality = true;
    this.slowMoEnabled = true;
    this.muted = false;
    this.launcher = {x:0,y:0};
    this.aiming = false;
    this.aimStart = {x:0,y:0};
    this.aimCurrent = {x:0,y:0};
    this.pointer = {x:innerWidth/2, y:innerHeight/2};
    this.lastTime = performance.now();
    this.fpsAcc=0; this.fpsCount=0; this.fpsDisplay=60;
    this.reassembling=false;
    this.reassembleT=0;
    this.objects = [];
    this.resize();
    this.buildLevel();
    this.bindInput();
    this.bindUI();
    requestAnimationFrame(this.loop.bind(this));
    window.addEventListener('resize', ()=>{ this.resize(); this.buildLevel(); });
  }

  resize(){
    const dpr = Math.min(window.devicePixelRatio||1, 2);
    this.dpr = dpr;
    this.w = window.innerWidth;
    this.h = window.innerHeight;
    this.canvas.width = this.w*dpr;
    this.canvas.height = this.h*dpr;
    this.canvas.style.width = this.w+'px';
    this.canvas.style.height = this.h+'px';
    this.ctx.setTransform(dpr,0,0,dpr,0,0);
    this.groundY = this.h - Math.max(48, this.h*0.09);
    this.launcher = {x:this.w/2, y:this.groundY+2};
  }

  //--------------------------------------------------------------
  // LEVEL BUILDING
  //--------------------------------------------------------------
  buildLevel(){
    this.objects = [];
    this.fragments.length = 0;
    this.projectiles.length = 0;
    this.buildPixelLevel();
  }

  buildPixelLevel(){
    const cell = clamp(this.w*0.022, 12, 22);
    const gridR = 11; // radius in cells
    const cx = this.w/2;
    const cy = (this.h*0.16 + this.groundY - this.h*0.05)/2 - 20;
    
    const invader = [
      "00100000100",
      "00010001000",
      "00111111100",
      "01101110110",
      "11111111111",
      "10111111101",
      "10100000101",
      "00011011000"
    ];

    for(let gy=-gridR; gy<=gridR; gy++){
      for(let gx=-gridR; gx<=gridR; gx++){
        let keep = false;
        if(this.mode === 'gem'){
          const d = Math.abs(gx)*0.62 + Math.abs(gy);
          keep = (d <= gridR*0.82);
        } else if(this.mode === 'heart'){
          const nx = gx / (gridR * 0.95);
          const ny = -gy / (gridR * 0.95) + 0.15;
          const val = nx * nx + Math.pow(ny - 0.6 * Math.sqrt(Math.abs(nx)), 2);
          keep = (val <= 0.48);
        } else if(this.mode === 'star'){
          const r = Math.hypot(gx, gy) / gridR;
          const angle = Math.atan2(gy, gx);
          const starVal = 0.52 + 0.32 * Math.cos(5 * angle - Math.PI / 2);
          keep = (r <= starVal);
        } else if(this.mode === 'ring'){
          const r = Math.hypot(gx, gy);
          keep = (r <= gridR * 0.85 && r >= gridR * 0.4);
        } else if(this.mode === 'invader'){
          const r = gy + 4;
          const c = gx + 5;
          if (r >= 0 && r < 8 && c >= 0 && c < 11) {
            keep = (invader[r][c] === '1');
          }
        }

        if(keep){
          const x = cx + gx*cell;
          const y = cy + gy*cell;
          const angle = Math.atan2(gy,gx);
          const hue = ((angle+Math.PI)/TAU*360 + 200)%360;
          const d = Math.hypot(gx, gy);
          const light = 55 + (1-d/(gridR*0.82))*20;
          const obj = {
            isPixel:true, x, y, w:cell-1.4, h:cell-1.4,
            color:`hsl(${hue},85%,${clamp(light, 40, 85)}%)`,
            colorLight:`hsl(${hue},85%,${Math.min(90,light+22)}%)`,
            broken:false, homeX:x, homeY:y
          };
          this.objects.push(obj);
        }
      }
    }
  }

  //--------------------------------------------------------------
  // FRAGMENT SPAWNING
  //--------------------------------------------------------------
  spawnFragment(opts){
    const f = new Fragment();
    f.init(opts);
    this.fragments.push(f);
    return f;
  }



  shatterPixel(obj, impactX, impactY, force){
    if(obj.broken) return;
    obj.broken = true;
    const dx = obj.x-impactX, dy = obj.y-impactY;
    const dd = Math.max(1,Math.hypot(dx,dy));
    const speed = clamp(force,200,900)*rand(0.7,1.3);
    this.spawnFragment({
      x:obj.x, y:obj.y,
      vx:(dx/dd)*speed*rand(0.6,1.1) + rand(-60,60),
      vy:(dx===0&&dy===0?-1:dy/dd)*speed*rand(0.6,1.1) - rand(40,140),
      rotation:rand(0,TAU), angVel:rand(-10,10),
      style:'pixel', w:obj.w, h:obj.h,
      color:obj.color, colorLight:obj.colorLight,
      mass:1, radius:Math.max(obj.w,obj.h)*0.7,
      homeX:obj.homeX, homeY:obj.homeY
    }).colorLight = obj.colorLight;
  }

  //--------------------------------------------------------------
  // INPUT
  //--------------------------------------------------------------
  bindInput(){
    const c = this.canvas;
    const getPos = (e)=>{
      if(e.touches && e.touches.length) return {x:e.touches[0].clientX, y:e.touches[0].clientY};
      if(e.changedTouches && e.changedTouches.length) return {x:e.changedTouches[0].clientX,y:e.changedTouches[0].clientY};
      return {x:e.clientX, y:e.clientY};
    };
    const down = (e)=>{
      e.preventDefault();
      this.audio.ensure();
      const p = getPos(e);
      this.aiming = true;
      this.aimStart = {x:p.x,y:p.y};
      this.aimCurrent = {x:p.x,y:p.y};
      this.hideHint();
    };
    const move = (e)=>{
      const p = getPos(e);
      this.pointer = p;
      if(this.aiming){ this.aimCurrent = {x:p.x,y:p.y}; }
    };
    const up = (e)=>{
      if(!this.aiming) return;
      this.aiming = false;
      const p = getPos(e) || this.aimCurrent;
      this.throwProjectile(this.aimStart, p);
    };
    c.addEventListener('mousedown', down);
    c.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
    c.addEventListener('touchstart', down, {passive:false});
    c.addEventListener('touchmove', move, {passive:false});
    c.addEventListener('touchend', up, {passive:false});
  }

  hideHint(){
    const h = document.getElementById('hint');
    if(h && h.style.opacity!=='0'){ h.style.opacity='0'; }
  }

  throwProjectile(from, to){
    const lx = this.launcher.x, ly = this.launcher.y;
    let dx = to.x-lx, dy = to.y-ly;
    let d = Math.hypot(dx,dy);
    if(d<2){ dx=0; dy=-1; d=1; }
    const dragDist = Math.hypot(to.x-from.x, to.y-from.y);
    const speed = clamp(Math.max(d, dragDist)*2.4, 700, 1700);
    const vx = (dx/d)*speed;
    const vy = (dy/d)*speed;
    this.projectiles.push(new Projectile(lx,ly,vx,vy,'ball'));
    this.audio.playLaunch();
  }

  //--------------------------------------------------------------
  // UI BINDING
  //--------------------------------------------------------------
  bindUI(){
    document.getElementById('shapeButtons').addEventListener('click',(e)=>{
      const btn = e.target.closest('.shape-btn');
      if(!btn) return;
      document.querySelectorAll('.shape-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      this.mode = btn.dataset.shape;
      this.buildLevel();
    });
    document.getElementById('resetBtn').addEventListener('click', ()=> this.startReassemble());
    const qb = document.getElementById('qualityBtn');
    qb.addEventListener('click', ()=>{
      this.quality = !this.quality;
      qb.classList.toggle('on', this.quality);
      qb.classList.toggle('off', !this.quality);
    });
    const sb = document.getElementById('slowmoBtn');
    sb.addEventListener('click', ()=>{
      this.slowMoEnabled = !this.slowMoEnabled;
      sb.classList.toggle('on', this.slowMoEnabled);
      sb.classList.toggle('off', !this.slowMoEnabled);
    });
    const mb = document.getElementById('muteBtn');
    mb.addEventListener('click', ()=>{
      this.muted = !this.muted;
      this.audio.setMuted(this.muted);
      mb.textContent = this.muted?'🔇':'🔊';
      mb.classList.toggle('on', !this.muted);
      mb.classList.toggle('off', this.muted);
    });
  }

  //--------------------------------------------------------------
  // REASSEMBLY (rebuild animation)
  //--------------------------------------------------------------
  startReassemble(){
    if(this.reassembling) return;
    if(this.fragments.length===0){
      // nothing broken — just flash reset
      this.buildLevel();
      this.audio.playChime();
      this.particles.burstDust(this.w/2,this.h*0.4,20,'rgba(180,220,255,0.6)');
      return;
    }
    this.reassembling = true;
    this.reassembleT = 0;
    for(const f of this.fragments){
      f.startX = f.x; f.startY = f.y; f.startRot = f.rotation;
    }
  }

  updateReassemble(dt){
    this.reassembleT += dt/0.7;
    const t = easeInOutCubic(clamp(this.reassembleT,0,1));
    for(const f of this.fragments){
      f.x = lerp(f.startX, f.homeX, t);
      f.y = lerp(f.startY, f.homeY, t);
      f.rotation = lerp(f.startRot, 0, t);
    }
    if(this.reassembleT>=1){
      this.reassembling = false;
      this.buildLevel();
      this.audio.playChime();
      this.particles.burstSparks(this.w/2, this.h*0.35, 24, '#bfe9ff');
      this.addShake(3);
    }
  }

  //--------------------------------------------------------------
  // SCORE / COMBO
  //--------------------------------------------------------------
  addScore(base){
    this.combo++;
    this.comboTimer = 1.3;
    const mult = 1+ (this.combo-1)*0.5;
    this.score += Math.round(base*mult);
    document.getElementById('scoreVal').textContent = this.score.toLocaleString();
    const cv = document.getElementById('comboVal');
    if(this.combo>1){
      cv.textContent = `COMBO x${this.combo}`;
      cv.classList.add('show');
    }
  }

  addShake(mag){ this.shake = Math.min(this.shake+mag, 30); }

  triggerSlowMo(){
    if(!this.slowMoEnabled) return;
    this.slowMoTimer = 0.5;
  }

  //--------------------------------------------------------------
  // MAIN LOOP
  //--------------------------------------------------------------
  loop(now){
    let dt = (now-this.lastTime)/1000;
    this.lastTime = now;
    dt = Math.min(dt,0.033);

    // fps
    this.fpsAcc += dt; this.fpsCount++;
    if(this.fpsAcc>=0.5){
      this.fpsDisplay = Math.round(this.fpsCount/this.fpsAcc);
      document.getElementById('fps').textContent = this.fpsDisplay+' FPS';
      this.fpsAcc=0; this.fpsCount=0;
    }

    // slow-mo timer counts down in REAL time
    if(this.slowMoTimer>0){
      this.slowMoTimer -= dt;
      this.timeScale = 0.3;
      if(this.slowMoTimer<=0) this.timeScale=1;
    } else {
      this.timeScale = 1;
    }
    const sdt = dt*this.timeScale;

    if(this.comboTimer>0){
      this.comboTimer -= dt;
      if(this.comboTimer<=0){
        this.combo=0;
        document.getElementById('comboVal').classList.remove('show');
      }
    }

    if(this.reassembling){
      this.updateReassemble(dt);
    } else {
      this.update(sdt, dt);
    }

    this.shake *= (1-6*dt);
    if(this.shake<0.05) this.shake=0;

    this.render();
    requestAnimationFrame(this.loop.bind(this));
  }

  update(dt, realDt){
    // projectiles
    for(let i=this.projectiles.length-1;i>=0;i--){
      const p = this.projectiles[i];
      p.update(dt, this.groundY, this.w);
      if(!p.alive){ this.projectiles.splice(i,1); continue; }
      this.checkProjectileCollisions(p);
    }

    // fragments physics
    const restitution = 0.42, floorFriction = 0.78;
    for(const f of this.fragments){
      f.update(dt, this.groundY, floorFriction, restitution, 1);
    }

    this.particles.update(dt);
  }

  checkProjectileCollisions(p){
    for(const obj of this.objects){
      if(obj.broken) continue;
      if(Math.abs(p.x-obj.x)<obj.w/2+p.radius*0.4 && Math.abs(p.y-obj.y)<obj.h/2+p.radius*0.4){
        this.hitPixel(obj, p);
      }
    }
  }

  hitPixel(obj, p){
    const speed = Math.hypot(p.vx,p.vy);
    this.shatterPixel(obj, p.x, p.y, speed*0.9);
    this.registerBreak(2);
  }

  registerBreak(baseScore){
    this.addScore(baseScore);
    const brokenAny = this.combo>0;
    if(this.combo===1){ this.audio.playCrack(); }
    // trigger big juice occasionally already handled per-call for panes/towers
    this.checkAllBroken();
  }

  checkAllBroken(){
    const remaining = this.objects.filter(o=>!o.broken).length;
    if(remaining===0 && this.objects.length>0){
      this.triggerSlowMo();
      this.addShake(14);
      this.audio.playGlassBreak(1.4);
    }
  }

  //--------------------------------------------------------------
  // RENDER
  //--------------------------------------------------------------
  render(){
    const ctx = this.ctx;
    ctx.clearRect(0,0,this.w,this.h);

    // background gradient
    const bg = ctx.createLinearGradient(0,0,0,this.h);
    bg.addColorStop(0,'#0c0c1e');
    bg.addColorStop(0.6,'#08081a');
    bg.addColorStop(1,'#05050b');
    ctx.fillStyle=bg;
    ctx.fillRect(0,0,this.w,this.h);

    // ambient glow blobs
    const glow1 = ctx.createRadialGradient(this.w*0.2,this.h*0.15,10,this.w*0.2,this.h*0.15,300);
    glow1.addColorStop(0,'rgba(155,107,255,0.10)');
    glow1.addColorStop(1,'rgba(155,107,255,0)');
    ctx.fillStyle=glow1; ctx.fillRect(0,0,this.w,this.h);
    const glow2 = ctx.createRadialGradient(this.w*0.85,this.h*0.25,10,this.w*0.85,this.h*0.25,320);
    glow2.addColorStop(0,'rgba(77,234,255,0.08)');
    glow2.addColorStop(1,'rgba(77,234,255,0)');
    ctx.fillStyle=glow2; ctx.fillRect(0,0,this.w,this.h);

    ctx.save();
    if(this.shake>0.1){
      ctx.translate((Math.random()-0.5)*this.shake, (Math.random()-0.5)*this.shake);
    }

    // ground
    const groundGrad = ctx.createLinearGradient(0,this.groundY,0,this.h);
    groundGrad.addColorStop(0,'rgba(70,80,140,0.35)');
    groundGrad.addColorStop(1,'rgba(10,10,20,0.9)');
    ctx.fillStyle = groundGrad;
    ctx.fillRect(0,this.groundY,this.w,this.h-this.groundY);
    ctx.strokeStyle='rgba(140,170,255,0.35)';
    ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(0,this.groundY); ctx.lineTo(this.w,this.groundY); ctx.stroke();
    // subtle grid on floor
    ctx.strokeStyle='rgba(140,170,255,0.08)';
    ctx.lineWidth=1;
    for(let gx=0; gx<this.w; gx+=40){
      ctx.beginPath(); ctx.moveTo(gx,this.groundY); ctx.lineTo(gx,this.h); ctx.stroke();
    }

    // intact objects
    for(const o of this.objects){
      if(o.broken) continue;
      ctx.save();
      ctx.translate(o.x,o.y);
      const grad = ctx.createLinearGradient(-o.w/2,-o.h/2,o.w/2,o.h/2);
      grad.addColorStop(0,o.colorLight);
      grad.addColorStop(1,o.color);
      ctx.fillStyle=grad;
      ctx.fillRect(-o.w/2,-o.h/2,o.w,o.h);
      ctx.restore();
    }

    // fragments
    for(const f of this.fragments) f.draw(ctx);

    // particles
    this.particles.draw(ctx);

    // projectiles
    for(const p of this.projectiles) p.draw(ctx);

    // aim line
    if(this.aiming){
      ctx.save();
      ctx.strokeStyle='rgba(77,234,255,0.7)';
      ctx.lineWidth=2;
      ctx.setLineDash([6,6]);
      ctx.beginPath();
      ctx.moveTo(this.launcher.x, this.launcher.y);
      ctx.lineTo(this.aimCurrent.x, this.aimCurrent.y);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle='rgba(77,234,255,0.9)';
      ctx.beginPath(); ctx.arc(this.launcher.x,this.launcher.y,6,0,TAU); ctx.fill();
      ctx.restore();
    }

    ctx.restore();

    // crosshair (glowing) - drawn outside shake transform for stability
    this.drawCrosshair(ctx);
  }

  drawCrosshair(ctx){
    const {x,y} = this.pointer;
    ctx.save();
    ctx.translate(x,y);
    const pulse = 1+Math.sin(performance.now()/220)*0.08;
    ctx.scale(pulse,pulse);
    ctx.shadowColor='#4deaff';
    ctx.shadowBlur=14;
    ctx.strokeStyle='rgba(77,234,255,0.9)';
    ctx.lineWidth=1.6;
    ctx.beginPath(); ctx.arc(0,0,14,0,TAU); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-20,0); ctx.lineTo(-8,0); ctx.moveTo(8,0); ctx.lineTo(20,0);
    ctx.moveTo(0,-20); ctx.lineTo(0,-8); ctx.moveTo(0,8); ctx.lineTo(0,20);
    ctx.stroke();
    ctx.fillStyle='rgba(255,255,255,0.9)';
    ctx.beginPath(); ctx.arc(0,0,2,0,TAU); ctx.fill();
    ctx.restore();
  }
}

//====================================================================
// BOOT
//====================================================================
window.addEventListener('load', ()=>{
  new Game();
});

})();
</script>
