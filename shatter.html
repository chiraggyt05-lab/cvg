<html lang="en">
<head>

<title>SHATTERPOINT — Glass Destruction Simulator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --neon-cyan:#4deaff;
    --neon-magenta:#ff4de8;
    --neon-purple:#9b6bff;
    --neon-amber:#ffcf4d;
    --panel-bg:rgba(18,20,38,0.55);
    --panel-border:rgba(160,180,255,0.18);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{
    margin:0; padding:0; width:100%; height:100%; overflow:hidden;
    background:radial-gradient(ellipse at 50% 20%, #0e1030 0%, #05050b 60%, #05050b 100%);
    font-family:'Rajdhani',sans-serif;
    color:#e8ecff;
    touch-action:none;
    user-select:none;
  }
  #gameCanvas{
    position:absolute; top:0; left:0; width:100%; height:100%; display:block;
    cursor:none;
  }
  .hud{
    position:fixed; left:0; top:0; width:100%; z-index:10;
    display:flex; justify-content:space-between; align-items:flex-start;
    padding:12px 14px; pointer-events:none;
    gap:10px;

  .panel{
    pointer-events:auto;
    background:var(--panel-bg);
    border:1px solid var(--panel-border);
    border-radius:14px;
    backdrop-filter:blur(14px) saturate(140%);
    -webkit-backdrop-filter:blur(14px) saturate(140%);
    box-shadow:0 4px 24px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.05);
  }
  .modes{
    display:flex; gap:6px; padding:6px;
  }
  .mode-btn{
    font-family:'Orbitron',sans-serif;
    font-size:10px; letter-spacing:0.5px;
    padding:9px 12px;
    background:transparent;
    border:1px solid transparent;
    border-radius:10px;
    color:#9aa3c9;
    cursor:pointer;
    transition:all .2s ease;
    white-space:nowrap;
  }
  .mode-btn:hover{ color:#fff; background:rgba(255,255,255,0.06); }
  .mode-btn.active{
    color:#04060f;
    background:linear-gradient(135deg, var(--neon-cyan), var(--neon-purple));
    box-shadow:0 0 18px rgba(77,234,255,0.55);
  }
  .stats{
    display:flex; flex-direction:column; align-items:center;
    padding:8px 22px;
    min-width:120px;
  }
  .stats .label{
    font-family:'Orbitron',sans-serif; font-size:9px; letter-spacing:2px; color:#7d86b8;
  }
  .stats .value{
    font-family:'Orbitron',sans-serif; font-size:22px; font-weight:700; color:#fff;
    text-shadow:0 0 12px rgba(77,234,255,0.6);
    line-height:1.3;
  }
  .combo-value{
    color:var(--neon-amber) !important;
    text-shadow:0 0 14px rgba(255,207,77,0.7) !important;
    opacity:0; transition:opacity .15s ease, transform .15s ease;
    transform:scale(0.8);
  }
  .combo-value.show{ opacity:1; transform:scale(1); }

  .controls{
    display:flex; gap:6px; align-items:center; padding:6px;
  }
  .icon-btn{
    width:38px; height:38px;
    border-radius:10px;
    border:1px solid var(--panel-border);
    background:rgba(255,255,255,0.03);
    color:#c9cfef;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer; font-size:16px;
    transition:all .2s ease;
  }
  .icon-btn:hover{ background:rgba(255,255,255,0.09); color:#fff; }
  .icon-btn.off{ color:#5b6390; }
  .icon-btn.on{ color:var(--neon-cyan); box-shadow:0 0 12px rgba(77,234,255,0.35) inset; }

  .reset-btn{
    font-family:'Orbitron',sans-serif;
    font-size:11px; letter-spacing:1px;
    padding:0 18px; height:38px;
    border-radius:10px;
    border:1px solid rgba(255,77,232,0.4);
    background:linear-gradient(135deg, rgba(255,77,232,0.18), rgba(155,107,255,0.18));
    color:#ffeaff;
    cursor:pointer;
    display:flex; align-items:center; gap:6px;
    transition:all .2s ease;
  }
  .reset-btn:hover{
    background:linear-gradient(135deg, rgba(255,77,232,0.35), rgba(155,107,255,0.35));
    box-shadow:0 0 20px rgba(255,77,232,0.4);
  }
  .reset-btn:active{ transform:scale(0.95); }

  .top-right{ display:flex; gap:8px; align-items:flex-start; }

  .hint{
    position:fixed; bottom:22px; left:50%; transform:translateX(-50%);
    font-family:'Orbitron',sans-serif; font-size:11px; letter-spacing:1.5px;
    color:rgba(230,235,255,0.55);
    background:rgba(10,12,26,0.4);
    border:1px solid rgba(160,180,255,0.12);
    padding:8px 18px; border-radius:20px;
    backdrop-filter:blur(8px);
    pointer-events:none;
    transition:opacity 1s ease;
    z-index:9;
  }

  .fps{
    position:fixed; bottom:14px; right:14px;
    font-family:'Orbitron',sans-serif; font-size:10px; color:rgba(120,255,180,0.7);
    background:rgba(0,0,0,0.35); padding:4px 8px; border-radius:6px;
    z-index:9; pointer-events:none;
    letter-spacing:1px;
  }

  .title-badge{
    position:fixed; bottom:14px; left:14px;
    font-family:'Orbitron',sans-serif; font-size:10px; letter-spacing:3px;
    color:rgba(155,107,255,0.55);
    z-index:9; pointer-events:none;
  }

  @media (max-width:720px){
    .stats{ padding:6px 12px; min-width:70px; }
    .stats .value{ font-size:16px; }
    .mode-btn{ padding:8px 8px; font-size:8.5px; }
    .reset-btn{ padding:0 12px; font-size:9.5px; }
    .icon-btn{ width:32px; height:32px; font-size:13px; }
    .hint{ font-size:9px; padding:6px 12px; bottom:10px; }
  }
</style>

<script>
(function(){
"use strict";

//====================================================================
// UTILITIES
//====================================================================
const rand = (a,b)=> a + Math.random()*(b-a);
const randInt = (a,b)=> Math.floor(rand(a,b+1));
const clamp = (v,a,b)=> Math.max(a,Math.min(b,v));
const lerp = (a,b,t)=> a+(b-a)*t;
const dist2 = (x1,y1,x2,y2)=>{ const dx=x2-x1, dy=y2-y1; return dx*dx+dy*dy; };
const dist = (x1,y1,x2,y2)=> Math.sqrt(dist2(x1,y1,x2,y2));
const easeOutCubic = t => 1-Math.pow(1-t,3);
const easeInOutCubic = t => t<0.5 ? 4*t*t*t : 1-Math.pow(-2*t+2,3)/2;
const TAU = Math.PI*2;

//====================================================================
// AUDIO ENGINE — synthesized, no external files
//====================================================================
class AudioEngine{
  constructor(){
    this.ctx = null;
    this.master = null;
    this.muted = false;
    this._unlocked = false;
  }
  ensure(){
    if(this.ctx) return;
    const AC = window.AudioContext || window.webkitAudioContext;
    this.ctx = new AC();
    this.master = this.ctx.createGain();
    this.master.gain.value = 0.75;
    this.master.connect(this.ctx.destination);
  }
  setMuted(m){
    this.muted = m;
    if(this.master) this.master.gain.value = m?0:0.75;
  }
  _noiseBuffer(duration){
    const ctx=this.ctx;
    const len = Math.max(1, Math.floor(ctx.sampleRate*duration));
    const buf = ctx.createBuffer(1, len, ctx.sampleRate);
    const data = buf.getChannelData(0);
    for(let i=0;i<len;i++){ data[i] = (Math.random()*2-1) * Math.pow(1-i/len, 0.4); }
    return buf;
  }
  playThud(intensity=1){
    this.ensure();
    if(this.muted) return;
    const ctx=this.ctx, t0=ctx.currentTime;
    const osc = ctx.createOscillator();
    osc.type='sine';
    osc.frequency.setValueAtTime(110*intensity+40, t0);
    osc.frequency.exponentialRampToValueAtTime(30, t0+0.18);
    const g = ctx.createGain();
    g.gain.setValueAtTime(0.0001, t0);
    g.gain.exponentialRampToValueAtTime(0.5*clamp(intensity,0.3,1.4), t0+0.008);
    g.gain.exponentialRampToValueAtTime(0.0001, t0+0.22);
    osc.connect(g); g.connect(this.master);
    osc.start(t0); osc.stop(t0+0.24);

    // noise click layer
    const src = ctx.createBufferSource();
    src.buffer = this._noiseBuffer(0.06);
    const nf = ctx.createBiquadFilter();
    nf.type='lowpass'; nf.frequency.value=500;
    const ng = ctx.createGain();
    ng.gain.setValueAtTime(0.25*clamp(intensity,0.3,1.4), t0);
    ng.gain.exponentialRampToValueAtTime(0.0001, t0+0.08);
    src.connect(nf); nf.connect(ng); ng.connect(this.master);
    src.start(t0);
  }
  playGlassBreak(intensity=1){
    this.ensure();
    if(this.muted) return;
    const ctx=this.ctx, t0=ctx.currentTime;
    intensity = clamp(intensity,0.4,1.8);

    // 1) noise crash burst, band-passed high
    const src = ctx.createBufferSource();
    src.buffer = this._noiseBuffer(0.35);
    const bp = ctx.createBiquadFilter();
    bp.type='bandpass'; bp.frequency.value = rand(2200,3800); bp.Q.value=0.7;
    const hp = ctx.createBiquadFilter();
    hp.type='highpass'; hp.frequency.value=1200;
    const ng = ctx.createGain();
    ng.gain.setValueAtTime(0.0001, t0);
    ng.gain.exponentialRampToValueAtTime(0.55*intensity, t0+0.012);
    ng.gain.exponentialRampToValueAtTime(0.0001, t0+0.3+0.1*intensity);
    src.connect(bp); bp.connect(hp); hp.connect(ng); ng.connect(this.master);
    src.start(t0);

    // 2) tinkle shards - short high sine/triangle blips staggered
    const tinkles = Math.round(6+intensity*8);
    for(let i=0;i<tinkles;i++){
      const dt = rand(0,0.28)*Math.pow(i/tinkles,0.5);
      const freq = rand(1800,5200);
      const o = ctx.createOscillator();
      o.type = Math.random()<0.5?'triangle':'sine';
      o.frequency.value = freq;
      o.frequency.exponentialRampToValueAtTime(freq*rand(1.05,1.4), t0+dt+0.06);
      const g = ctx.createGain();
      const vol = 0.09*intensity*rand(0.5,1);
      g.gain.setValueAtTime(0.0001, t0+dt);
      g.gain.exponentialRampToValueAtTime(vol, t0+dt+0.005);
      g.gain.exponentialRampToValueAtTime(0.0001, t0+dt+rand(0.08,0.22));
      o.connect(g); g.connect(this.master);
      o.start(t0+dt); o.stop(t0+dt+0.3);
    }

    // 3) low thump under the crash
    this.playThud(0.7*intensity);
  }
  playChime(){
    this.ensure();
    if(this.muted) return;
    const ctx=this.ctx, t0=ctx.currentTime;
    const notes=[523.25,659.25,783.99,1046.5];
    notes.forEach((f,i)=>{
      const o=ctx.createOscillator();
      o.type='sine'; o.frequency.value=f;
      const g=ctx.createGain();
      const start=t0+i*0.075;
      g.gain.setValueAtTime(0.0001,start);
      g.gain.exponentialRampToValueAtTime(0.22,start+0.02);
      g.gain.exponentialRampToValueAtTime(0.0001,start+0.5);
      o.connect(g); g.connect(this.master);
      o.start(start); o.stop(start+0.55);
    });
  }
  playCrack(){
    this.ensure();
    if(this.muted) return;
    const ctx=this.ctx, t0=ctx.currentTime;
    const src=ctx.createBufferSource();
    src.buffer=this._noiseBuffer(0.05);
    const bp=ctx.createBiquadFilter();
    bp.type='highpass'; bp.frequency.value=3500;
    const g=ctx.createGain();
    g.gain.setValueAtTime(0.15,t0);
    g.gain.exponentialRampToValueAtTime(0.0001,t0+0.06);
    src.connect(bp); bp.connect(g); g.connect(this.master);
    src.start(t0);
  }
  playLaunch(){
    this.ensure();
    if(this.muted) return;
    const ctx=this.ctx, t0=ctx.currentTime;
    const o=ctx.createOscillator();
    o.type='sawtooth';
    o.frequency.setValueAtTime(180,t0);
    o.frequency.exponentialRampToValueAtTime(500,t0+0.09);
    const g=ctx.createGain();
    g.gain.setValueAtTime(0.0001,t0);
    g.gain.exponentialRampToValueAtTime(0.12,t0+0.01);
    g.gain.exponentialRampToValueAtTime(0.0001,t0+0.12);
    o.connect(g); g.connect(this.master);
    o.start(t0); o.stop(t0+0.14);
  }
}

//====================================================================
// PARTICLE (dust / spark) + POOL
//====================================================================
class Particle{
  constructor(){ this.alive=false; }
  spawn(x,y,vx,vy,life,size,color,type,gravity){
    this.x=x; this.y=y; this.vx=vx; this.vy=vy;
    this.life=life; this.maxLife=life;
    this.size=size; this.color=color; this.type=type||'dust';
    this.gravity = gravity!==undefined?gravity:900;
    this.alive=true;
    this.rot = rand(0,TAU);
    this.vrot = rand(-6,6);
  }
  update(dt){
    if(!this.alive) return;
    this.life -= dt;
    if(this.life<=0){ this.alive=false; return; }
    this.vy += this.gravity*dt;
    if(this.type==='spark'){ this.vx *= (1-2.2*dt); this.vy *= (1-1.2*dt); }
    else { this.vx *= (1-0.6*dt); }
    this.x += this.vx*dt;
    this.y += this.vy*dt;
    this.rot += this.vrot*dt;
  }
  draw(ctx){
    if(!this.alive) return;
    const t = this.life/this.maxLife;
    ctx.save();
    ctx.globalAlpha = clamp(t,0,1);
    ctx.translate(this.x,this.y);
    if(this.type==='spark'){
      ctx.rotate(this.rot);
      ctx.strokeStyle = this.color;
      ctx.lineWidth = Math.max(1,this.size*0.4);
      ctx.shadowColor = this.color;
      ctx.shadowBlur = 6;
      ctx.beginPath();
      ctx.moveTo(-this.size,0); ctx.lineTo(this.size,0);
      ctx.stroke();
    } else {
      ctx.fillStyle = this.color;
      ctx.beginPath();
      ctx.arc(0,0,this.size*t*0.8+0.5,0,TAU);
      ctx.fill();
    }
    ctx.restore();
  }
}
class ParticlePool{
  constructor(max){
    this.max=max;
    this.pool=[];
    for(let i=0;i<max;i++) this.pool.push(new Particle());
    this.cursor=0;
  }
  spawn(x,y,vx,vy,life,size,color,type,gravity){
    const p = this.pool[this.cursor];
    this.cursor = (this.cursor+1)%this.max;
    p.spawn(x,y,vx,vy,life,size,color,type,gravity);
  }
  burstDust(x,y,count,color){
    for(let i=0;i<count;i++){
      const a = rand(0,TAU);
      const spd = rand(20,180);
      this.spawn(x,y, Math.cos(a)*spd, Math.sin(a)*spd-60, rand(0.4,1.1), rand(1.5,4), color||'rgba(200,210,255,0.8)','dust', 500);
    }
  }
  burstSparks(x,y,count,color){
    for(let i=0;i<count;i++){
      const a = rand(0,TAU);
      const spd = rand(150,650);
      this.spawn(x,y, Math.cos(a)*spd, Math.sin(a)*spd, rand(0.15,0.4), rand(4,10), color||'#eaf6ff','spark', 700);
    }
  }
  update(dt){ for(const p of this.pool) p.update(dt); }
  draw(ctx){ for(const p of this.pool) p.draw(ctx); }
}

//====================================================================
// FRAGMENT — unified physics body for shards / blocks / pixels
//====================================================================
class Fragment{
  constructor(){ this.alive=false; }
  init(opts){
    // opts: points(local polygon around centroid, for style 'glass'/'block'), w,h (for pixel), x,y (world centroid), vx,vy, angVel, style, color, mass, groundY, homeX, homeY, homeRot
    this.points = opts.points || null;
    this.w = opts.w||0; this.h=opts.h||0;
    this.x = opts.x; this.y = opts.y;
    this.vx = opts.vx||0; this.vy = opts.vy||0;
    this.rotation = opts.rotation||0;
    this.angVel = opts.angVel||0;
    this.style = opts.style||'glass'; // 'glass' | 'pixel'
    this.color = opts.color || '#bfe9ff';
    this.mass = opts.mass || 1;
    this.radius = opts.radius || 14;
    this.settled = false;
    this.alive = true;
    this.homeX = opts.homeX!==undefined?opts.homeX:this.x;
    this.homeY = opts.homeY!==undefined?opts.homeY:this.y;
    this.homeRot = opts.homeRot||0;
    this.life = 1;
    this.spawnScale = 0;
  }
  update(dt, groundY, floorFriction, restitution, gravityScale){
    if(!this.alive) return;
    if(this.spawnScale<1) this.spawnScale = Math.min(1, this.spawnScale + dt*8);
    if(this.settled) return;
    this.vy += 1500*gravityScale*dt / Math.max(0.4,this.mass*0.0+1); // uniform gravity, mass affects via inertia feel
    this.x += this.vx*dt;
    this.y += this.vy*dt;
    this.rotation += this.angVel*dt;
    // air drag
    this.vx *= (1-0.08*dt);
    this.angVel *= (1-0.5*dt);

    const halfH = this.style==='pixel' ? this.h/2 : this.radius*0.55;
    if(this.y + halfH > groundY){
      this.y = groundY - halfH;
      if(Math.abs(this.vy) > 40){
        this.vy = -this.vy*restitution;
        this.vx *= floorFriction;
        this.angVel *= 0.6;
      } else {
        this.vy = 0;
      }
      this.vx *= floorFriction;
      this.angVel *= floorFriction;
      if(Math.abs(this.vy)<28 && Math.abs(this.vx)<12 && Math.abs(this.angVel)<0.15){
        this.settled = true;
        this.vx=0; this.vy=0; this.angVel=0;
      }
    }
    // side walls (soft bounce off canvas edges) handled by caller bounds via clamp
  }
  draw(ctx, glowColor){
    if(!this.alive) return;
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(this.rotation);
    const s = this.spawnScale;
    ctx.scale(s,s);
    if(this.style==='pixel'){
      const w=this.w, h=this.h;
      const grad = ctx.createLinearGradient(-w/2,-h/2,w/2,h/2);
      grad.addColorStop(0, this.colorLight || this.color);
      grad.addColorStop(1, this.color);
      ctx.fillStyle = grad;
      ctx.fillRect(-w/2,-h/2,w,h);
      ctx.strokeStyle = 'rgba(0,0,0,0.25)';
      ctx.lineWidth=1;
      ctx.strokeRect(-w/2,-h/2,w,h);
    } else {
      // glass shard polygon with refraction-like gradient + rim light
      const pts = this.points;
      ctx.beginPath();
      ctx.moveTo(pts[0].x, pts[0].y);
      for(let i=1;i<pts.length;i++) ctx.lineTo(pts[i].x, pts[i].y);
      ctx.closePath();
      const grad = ctx.createLinearGradient(-this.radius,-this.radius,this.radius,this.radius);
      grad.addColorStop(0, 'rgba(255,255,255,0.55)');
      grad.addColorStop(0.35, this.color);
      grad.addColorStop(0.7, this.colorDark || 'rgba(90,140,200,0.35)');
      grad.addColorStop(1, 'rgba(255,255,255,0.15)');
      ctx.fillStyle = grad;
      ctx.fill();
      ctx.lineWidth = 1;
      ctx.strokeStyle = 'rgba(220,240,255,0.55)';
      ctx.stroke();
      // small specular highlight
      ctx.globalCompositeOperation = 'lighter';
      ctx.fillStyle = 'rgba(255,255,255,0.12)';
      ctx.beginPath();
      ctx.moveTo(pts[0].x*0.3, pts[0].y*0.3);
      ctx.lineTo(pts[1] ? pts[1].x*0.15 : 2, pts[1]?pts[1].y*0.15:2);
      ctx.lineTo(0,0);
      ctx.closePath();
      ctx.fill();
      ctx.globalCompositeOperation = 'source-over';
    }
    ctx.restore();
  }
}

//====================================================================
// PROJECTILE
//====================================================================
class Projectile{
  constructor(x,y,vx,vy,kind){
    this.x=x; this.y=y; this.vx=vx; this.vy=vy;
    this.radius = kind==='hammer'?16:12;
    this.kind = kind||'ball';
    this.alive=true;
    this.trail=[];
    this.bounces=0;
  }
  update(dt, groundY, w){
    this.vy += 1100*dt;
    this.x += this.vx*dt;
    this.y += this.vy*dt;
    this.trail.push({x:this.x,y:this.y});
    if(this.trail.length>10) this.trail.shift();
    if(this.y+this.radius>groundY){
      this.y = groundY-this.radius;
      this.vy *= -0.45;
      this.vx *= 0.7;
      this.bounces++;
      if(Math.abs(this.vy)<60) this.vy=0;
    }
    if(this.x<-50||this.x>w+50||this.bounces>6) this.alive=false;
  }
  draw(ctx){
    ctx.save();
    for(let i=0;i<this.trail.length;i++){
      const t = this.trail[i];
      ctx.globalAlpha = (i/this.trail.length)*0.35;
      ctx.fillStyle = '#4deaff';
      ctx.beginPath();
      ctx.arc(t.x,t.y,this.radius*(i/this.trail.length)*0.8,0,TAU);
      ctx.fill();
    }
    ctx.globalAlpha=1;
    const grad = ctx.createRadialGradient(this.x-this.radius*0.3,this.y-this.radius*0.3,1,this.x,this.y,this.radius*1.6);
    grad.addColorStop(0,'#ffffff');
    grad.addColorStop(0.4,'#8fe8ff');
    grad.addColorStop(1,'rgba(77,234,255,0.05)');
    ctx.shadowColor='#4deaff';
    ctx.shadowBlur=18;
    ctx.fillStyle=grad;
    ctx.beginPath();
    ctx.arc(this.x,this.y,this.radius,0,TAU);
    ctx.fill();
    ctx.restore();
  }
}

//====================================================================
// SHATTER PATTERN GENERATION (spider-web radial-crack triangulation)
//====================================================================
function generateShatterPolygons(cx, cy, boundsFn, impactX, impactY, seedCount){
  // boundsFn(angle) returns max radius from (cx,cy) along angle before leaving shape bounds
  const spokes = randInt(7,11);
  const rings = randInt(2,3);
  const angles = [];
  for(let i=0;i<spokes;i++) angles.push((i/spokes)*TAU + rand(-0.18,0.18));
  angles.sort((a,b)=>a-b);

  const ringRadii = [];
  for(let r=1;r<=rings;r++) ringRadii.push((r/rings));

  const polys = [];
  // central shard fan near impact point
  const innerR = 0.14;
  for(let i=0;i<angles.length;i++){
    const a0=angles[i], a1=angles[(i+1)%angles.length];
    const maxR0 = boundsFn(a0), maxR1 = boundsFn(a1);
    const p0 = {x: impactX + Math.cos(a0)*innerR*maxR0*rand(0.6,1), y: impactY + Math.sin(a0)*innerR*maxR0*rand(0.6,1)};
    const p1 = {x: impactX + Math.cos(a1)*innerR*maxR1*rand(0.6,1), y: impactY + Math.sin(a1)*innerR*maxR1*rand(0.6,1)};
    polys.push([{x:impactX,y:impactY}, p0, p1]);
  }
  // ring bands from inner to outer
  let prevRing = angles.map(a=>{
    const maxR = boundsFn(a);
    return {x: impactX + Math.cos(a)*innerR*maxR, y: impactY + Math.sin(a)*innerR*maxR};
  });
  for(let ri=0; ri<ringRadii.length; ri++){
    const frac = ringRadii[ri];
    const curRing = angles.map(a=>{
      const maxR = boundsFn(a);
      const jitter = rand(0.82,1.05);
      const rr = Math.min(maxR, maxR*frac*jitter);
      return {x: impactX + Math.cos(a)*rr, y: impactY + Math.sin(a)*rr};
    });
    for(let i=0;i<angles.length;i++){
      const j=(i+1)%angles.length;
      polys.push([prevRing[i], prevRing[j], curRing[j], curRing[i]]);
    }
    prevRing = curRing;
  }
  return polys; // array of point arrays (world coords, will be re-centered by caller)
}

function polyCentroid(pts){
  let x=0,y=0;
  for(const p of pts){ x+=p.x; y+=p.y; }
  return {x:x/pts.length, y:y/pts.length};
}
function polyArea(pts){
  let a=0;
  for(let i=0;i<pts.length;i++){
    const p1=pts[i], p2=pts[(i+1)%pts.length];
    a += p1.x*p2.y - p2.x*p1.y;
  }
  return Math.abs(a)/2;
}

//====================================================================
// BREAKABLE OBJECTS
//====================================================================
class BreakableBase{
  constructor(){ this.broken=false; this.fragments=[]; this.crackT=0; this.cracking=false; }
}

class Pane extends BreakableBase{
  constructor(x,y,w,h,frameColor){
    super();
    this.x=x; this.y=y; this.w=w; this.h=h;
    this.hue = rand(190,210);
  }
  get bounds(){ return {x:this.x,y:this.y,w:this.w,h:this.h}; }
  containsPoint(px,py){ return px>=this.x && px<=this.x+this.w && py>=this.y && py<=this.y+this.h; }
  drawIntact(ctx, t){
    const {x,y,w,h}=this;
    ctx.save();
    if(this.cracking){
      ctx.translate((Math.random()-0.5)*1.2*this.crackShake, (Math.random()-0.5)*1.2*this.crackShake);
    }
    const grad = ctx.createLinearGradient(x,y,x+w,y+h);
    grad.addColorStop(0,`hsla(${this.hue},80%,75%,0.16)`);
    grad.addColorStop(0.5,`hsla(${this.hue},85%,70%,0.10)`);
    grad.addColorStop(1,`hsla(${this.hue},80%,60%,0.18)`);
    ctx.fillStyle=grad;
    ctx.fillRect(x,y,w,h);
    // shine streak
    ctx.save();
    ctx.beginPath(); ctx.rect(x,y,w,h); ctx.clip();
    ctx.fillStyle='rgba(255,255,255,0.10)';
    ctx.beginPath();
    ctx.moveTo(x+w*0.1,y); ctx.lineTo(x+w*0.28,y); ctx.lineTo(x-w*0.05,y+h); ctx.lineTo(x-w*0.22,y+h);
    ctx.closePath(); ctx.fill();
    ctx.restore();
    // frame
    ctx.strokeStyle='rgba(140,160,220,0.55)';
    ctx.lineWidth=3;
    ctx.strokeRect(x+1.5,y+1.5,w-3,h-3);
    // cracks (pre-shatter)
    if(this.cracking && this.crackLines){
      ctx.strokeStyle=`rgba(255,255,255,${0.5+0.4*Math.sin(t*40)})`;
      ctx.lineWidth=1.4;
      ctx.shadowColor='#bfe9ff'; ctx.shadowBlur=4;
      for(const line of this.crackLines){
        ctx.beginPath();
        ctx.moveTo(line[0].x,line[0].y);
        for(let i=1;i<line.length;i++) ctx.lineTo(line[i].x,line[i].y);
        ctx.stroke();
      }
    }
    ctx.restore();
  }
}

class TowerBlock extends BreakableBase{
  constructor(x,y,w,h,hue){
    super();
    this.x=x; this.y=y; this.w=w; this.h=h; // x,y = center
    this.rotation=0; this.vx=0; this.vy=0; this.angVel=0;
    this.knocked=false; this.hue=hue;
    this.homeX=x; this.homeY=y;
  }
  get left(){ return this.x-this.w/2; }
  get right(){ return this.x+this.w/2; }
  get top(){ return this.y-this.h/2; }
  get bottom(){ return this.y+this.h/2; }
  containsPoint(px,py){
    // simple rotated check via inverse rotate
    const dx=px-this.x, dy=py-this.y;
    const cos=Math.cos(-this.rotation), sin=Math.sin(-this.rotation);
    const lx = dx*cos-dy*sin, ly = dx*sin+dy*cos;
    return lx>=-this.w/2 && lx<=this.w/2 && ly>=-this.h/2 && ly<=this.h/2;
  }
  update(dt, groundY, blocksBelowTop){
    if(!this.knocked) return;
    this.angVel *= (1-0.15*dt);
    this.vy += 1500*dt;
    this.x += this.vx*dt;
    this.y += this.vy*dt;
    this.rotation += this.angVel*dt;
    this.vx *= (1-0.2*dt);
    const restTop = groundY - this.h/2;
    if(this.y > restTop && Math.abs(this.rotation)<0.05){
      // landed roughly upright-ish, let settle
    }
  }
  drawIntact(ctx){
    ctx.save();
    ctx.translate(this.x,this.y);
    ctx.rotate(this.rotation);
    const w=this.w,h=this.h;
    const grad = ctx.createLinearGradient(-w/2,-h/2,w/2,h/2);
    grad.addColorStop(0,`hsla(${this.hue},80%,78%,0.22)`);
    grad.addColorStop(0.5,`hsla(${this.hue},85%,68%,0.14)`);
    grad.addColorStop(1,`hsla(${this.hue},75%,55%,0.24)`);
    ctx.fillStyle=grad;
    ctx.fillRect(-w/2,-h/2,w,h);
    ctx.fillStyle='rgba(255,255,255,0.14)';
    ctx.fillRect(-w/2+3,-h/2+3,w*0.22,h-6);
    ctx.strokeStyle='rgba(160,190,255,0.6)';
    ctx.lineWidth=2;
    ctx.strokeRect(-w/2+1,-h/2+1,w-2,h-2);
    ctx.restore();
  }
}

//====================================================================
// GAME
//====================================================================
class Game{
  constructor(){
    this.canvas = document.getElementById('gameCanvas');
    this.ctx = this.canvas.getContext('2d');
    this.audio = new AudioEngine();
    this.particles = new ParticlePool(420);
    this.fragments = [];
    this.fragPool = [];
    this.projectiles = [];
    this.mode = 'pane';
    this.score = 0;
    this.combo = 0;
    this.comboTimer = 0;
    this.timeScale = 1;
    this.slowMoTimer = 0;
    this.shake = 0;
    this.quality = true;
    this.slowMoEnabled = true;
    this.muted = false;
    this.launcher = {x:0,y:0};
    this.aiming = false;
    this.aimStart = {x:0,y:0};
    this.aimCurrent = {x:0,y:0};
    this.pointer = {x:innerWidth/2, y:innerHeight/2};
    this.lastTime = performance.now();
    this.fpsAcc=0; this.fpsCount=0; this.fpsDisplay=60;
    this.reassembling=false;
    this.reassembleT=0;
    this.objects = [];
    this.resize();
    this.buildLevel();
    this.bindInput();
    this.bindUI();
    requestAnimationFrame(this.loop.bind(this));
    window.addEventListener('resize', ()=>{ this.resize(); this.buildLevel(); });
  }

  resize(){
    const dpr = Math.min(window.devicePixelRatio||1, 2);
    this.dpr = dpr;
    this.w = window.innerWidth;
    this.h = window.innerHeight;
    this.canvas.width = this.w*dpr;
    this.canvas.height = this.h*dpr;
    this.canvas.style.width = this.w+'px';
    this.canvas.style.height = this.h+'px';
    this.ctx.setTransform(dpr,0,0,dpr,0,0);
    this.groundY = this.h - Math.max(48, this.h*0.09);
    this.launcher = {x:this.w/2, y:this.groundY+2};
  }

  //--------------------------------------------------------------
  // LEVEL BUILDING
  //--------------------------------------------------------------
  buildLevel(){
    this.objects = [];
    this.fragments.length = 0;
    this.projectiles.length = 0;
    if(this.mode==='pane') this.buildPaneLevel();
    else if(this.mode==='tower') this.buildTowerLevel();
    else this.buildPixelLevel();
  }

  buildPaneLevel(){
    const margin = this.w*0.08;
    const top = this.h*0.16;
    const bottom = this.groundY - this.h*0.06;
    const cols = this.w<700?2:3;
    const rows = this.w<700?3:2;
    const gap = 14;
    const areaW = this.w - margin*2;
    const areaH = bottom-top;
    const cw = (areaW-gap*(cols-1))/cols;
    const ch = (areaH-gap*(rows-1))/rows;
    for(let r=0;r<rows;r++){
      for(let c=0;c<cols;c++){
        const x = margin + c*(cw+gap);
        const y = top + r*(ch+gap);
        this.objects.push(new Pane(x,y,cw,ch));
      }
    }
  }

  buildTowerLevel(){
    const blockW = clamp(this.w*0.11, 56, 110);
    const blockH = blockW*0.62;
    const levels = 6;
    const cx = this.w/2;
    let y = this.groundY - blockH/2;
    for(let i=0;i<levels;i++){
      const hue = 195 + i*6;
      const b = new TowerBlock(cx, y, blockW, blockH, hue);
      this.objects.push(b);
      y -= blockH+2;
    }
  }

  buildPixelLevel(){
    const cell = clamp(this.w*0.022, 12, 22);
    const gridR = 11; // radius in cells (diamond gem shape)
    const cx = this.w/2;
    const cy = (this.h*0.16 + this.groundY - this.h*0.05)/2 - 20;
    for(let gy=-gridR; gy<=gridR; gy++){
      for(let gx=-gridR; gx<=gridR; gx++){
        const d = Math.abs(gx)*0.62 + Math.abs(gy);
        if(d<=gridR*0.82){
          const x = cx + gx*cell;
          const y = cy + gy*cell;
          const angle = Math.atan2(gy,gx);
          const hue = ((angle+Math.PI)/TAU*360 + 200)%360;
          const light = 55 + (1-d/(gridR*0.82))*20;
          const obj = {
            isPixel:true, x, y, w:cell-1.4, h:cell-1.4,
            color:`hsl(${hue},85%,${light}%)`,
            colorLight:`hsl(${hue},85%,${Math.min(90,light+22)}%)`,
            broken:false, homeX:x, homeY:y
          };
          this.objects.push(obj);
        }
      }
    }
  }

  //--------------------------------------------------------------
  // FRAGMENT SPAWNING
  //--------------------------------------------------------------
  spawnFragment(opts){
    const f = new Fragment();
    f.init(opts);
    this.fragments.push(f);
    return f;
  }

  shatterPane(pane, ix, iy, impactSpeed){
    if(pane.broken) return;
    pane.broken = true;
    const {x,y,w,h} = pane;
    const impactX = clamp(ix,x+4,x+w-4), impactY = clamp(iy,y+4,y+h-4);
    const boundsFn = (angle)=>{
      // distance to rectangle edge from impact point along angle
      const dx=Math.cos(angle), dy=Math.sin(angle);
      let tMax = Infinity;
      if(dx>0) tMax=Math.min(tMax,(x+w-impactX)/dx);
      if(dx<0) tMax=Math.min(tMax,(x-impactX)/dx);
      if(dy>0) tMax=Math.min(tMax,(y+h-impactY)/dy);
      if(dy<0) tMax=Math.min(tMax,(y-impactY)/dy);
      return Math.max(4,tMax);
    };
    const polys = generateShatterPolygons(x+w/2,y+h/2, boundsFn, impactX, impactY);
    const force = clamp(impactSpeed/500, 0.6, 3.2);
    for(const poly of polys){
      // clip roughly by clamping points into rect (cheap clipping)
      const clamped = poly.map(p=>({x:clamp(p.x,x-2,x+w+2), y:clamp(p.y,y-2,y+h+2)}));
      const c = polyCentroid(clamped);
      const local = clamped.map(p=>({x:p.x-c.x,y:p.y-c.y}));
      const area = polyArea(clamped);
      const mass = clamp(area/500,0.4,3.5);
      const dx = c.x-impactX, dy = c.y-impactY;
      const dd = Math.max(1,Math.hypot(dx,dy));
      const outSpeed = force*rand(120,320)*(1/Math.sqrt(mass));
      const radius = Math.sqrt(area)*0.6+6;
      this.spawnFragment({
        points: local,
        x:c.x, y:c.y,
        vx: (dx/dd)*outSpeed + rand(-40,40),
        vy: (dy/dd)*outSpeed - rand(60,180),
        rotation: rand(0,TAU),
        angVel: rand(-6,6),
        style:'glass',
        color: `hsla(${pane.hue},70%,72%,0.55)`,
        colorDark: `hsla(${pane.hue},60%,40%,0.35)`,
        mass, radius,
        homeX: c.x, homeY: c.y, homeRot: 0
      });
    }
  }

  shatterBlockOnGround(block){
    if(block.shattered) return;
    block.shattered = true;
    block.knocked = true;
    const cx=block.x, cy=block.y, w=block.w, h=block.h;
    const boundsFn=(angle)=>{
      const dx=Math.cos(angle), dy=Math.sin(angle);
      let tMax=Infinity;
      if(dx!==0) tMax=Math.min(tMax, (w/2)/Math.abs(dx));
      if(dy!==0) tMax=Math.min(tMax, (h/2)/Math.abs(dy));
      return Math.max(4,tMax);
    };
    const polys = generateShatterPolygons(cx,cy, boundsFn, cx, cy, 6);
    for(const poly of polys){
      const rot = block.rotation;
      const cos=Math.cos(rot), sin=Math.sin(rot);
      const world = poly.map(p=>{
        const lx = p.x-cx, ly = p.y-cy;
        return { x: cx + lx*cos-ly*sin, y: cy + lx*sin+ly*cos };
      });
      const c = polyCentroid(world);
      const local = world.map(p=>({x:p.x-c.x,y:p.y-c.y}));
      const area = polyArea(world);
      const mass = clamp(area/400,0.4,3);
      const dx=c.x-cx, dy=c.y-cy;
      const dd=Math.max(1,Math.hypot(dx,dy));
      const radius = Math.sqrt(area)*0.6+6;
      this.spawnFragment({
        points: local, x:c.x, y:c.y,
        vx:(dx/dd)*rand(60,220)+block.vx*0.3,
        vy:(dy/dd)*rand(40,140)-rand(80,200),
        rotation:rand(0,TAU), angVel:rand(-8,8),
        style:'glass',
        color:`hsla(${block.hue},70%,72%,0.55)`,
        colorDark:`hsla(${block.hue},60%,40%,0.35)`,
        mass, radius, homeX:c.x, homeY:c.y
      });
    }
    this.particles.burstDust(cx,cy,this.quality?26:12,'rgba(200,220,255,0.7)');
    this.particles.burstSparks(cx,cy,this.quality?18:8,'#bfe9ff');
    this.audio.playGlassBreak(0.9);
    this.addShake(6);
  }

  shatterPixel(obj, impactX, impactY, force){
    if(obj.broken) return;
    obj.broken = true;
    const dx = obj.x-impactX, dy = obj.y-impactY;
    const dd = Math.max(1,Math.hypot(dx,dy));
    const speed = clamp(force,200,900)*rand(0.7,1.3);
    this.spawnFragment({
      x:obj.x, y:obj.y,
      vx:(dx/dd)*speed*rand(0.6,1.1) + rand(-60,60),
      vy:(dx===0&&dy===0?-1:dy/dd)*speed*rand(0.6,1.1) - rand(40,140),
      rotation:rand(0,TAU), angVel:rand(-10,10),
      style:'pixel', w:obj.w, h:obj.h,
      color:obj.color, colorLight:obj.colorLight,
      mass:1, radius:Math.max(obj.w,obj.h)*0.7,
      homeX:obj.homeX, homeY:obj.homeY
    }).colorLight = obj.colorLight;
  }

  //--------------------------------------------------------------
  // INPUT
  //--------------------------------------------------------------
  bindInput(){
    const c = this.canvas;
    const getPos = (e)=>{
      if(e.touches && e.touches.length) return {x:e.touches[0].clientX, y:e.touches[0].clientY};
      if(e.changedTouches && e.changedTouches.length) return {x:e.changedTouches[0].clientX,y:e.changedTouches[0].clientY};
      return {x:e.clientX, y:e.clientY};
    };
    const down = (e)=>{
      e.preventDefault();
      this.audio.ensure();
      const p = getPos(e);
      this.aiming = true;
      this.aimStart = {x:p.x,y:p.y};
      this.aimCurrent = {x:p.x,y:p.y};
      this.hideHint();
    };
    const move = (e)=>{
      const p = getPos(e);
      this.pointer = p;
      if(this.aiming){ this.aimCurrent = {x:p.x,y:p.y}; }
    };
    const up = (e)=>{
      if(!this.aiming) return;
      this.aiming = false;
      const p = getPos(e) || this.aimCurrent;
      this.throwProjectile(this.aimStart, p);
    };
    c.addEventListener('mousedown', down);
    c.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
    c.addEventListener('touchstart', down, {passive:false});
    c.addEventListener('touchmove', move, {passive:false});
    c.addEventListener('touchend', up, {passive:false});
  }

  hideHint(){
    const h = document.getElementById('hint');
    if(h && h.style.opacity!=='0'){ h.style.opacity='0'; }
  }

  throwProjectile(from, to){
    const lx = this.launcher.x, ly = this.launcher.y;
    let dx = to.x-lx, dy = to.y-ly;
    let d = Math.hypot(dx,dy);
    if(d<2){ dx=0; dy=-1; d=1; }
    const dragDist = Math.hypot(to.x-from.x, to.y-from.y);
    const speed = clamp(Math.max(d, dragDist)*2.4, 700, 1700);
    const vx = (dx/d)*speed;
    const vy = (dy/d)*speed;
    this.projectiles.push(new Projectile(lx,ly,vx,vy,'ball'));
    this.audio.playLaunch();
  }

  //--------------------------------------------------------------
  // UI BINDING
  //--------------------------------------------------------------
  bindUI(){
    document.getElementById('modeButtons').addEventListener('click',(e)=>{
      const btn = e.target.closest('.mode-btn');
      if(!btn) return;
      document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      this.mode = btn.dataset.mode;
      this.buildLevel();
    });
    document.getElementById('resetBtn').addEventListener('click', ()=> this.startReassemble());
    const qb = document.getElementById('qualityBtn');
    qb.addEventListener('click', ()=>{
      this.quality = !this.quality;
      qb.classList.toggle('on', this.quality);
      qb.classList.toggle('off', !this.quality);
    });
    const sb = document.getElementById('slowmoBtn');
    sb.addEventListener('click', ()=>{
      this.slowMoEnabled = !this.slowMoEnabled;
      sb.classList.toggle('on', this.slowMoEnabled);
      sb.classList.toggle('off', !this.slowMoEnabled);
    });
    const mb = document.getElementById('muteBtn');
    mb.addEventListener('click', ()=>{
      this.muted = !this.muted;
      this.audio.setMuted(this.muted);
      mb.textContent = this.muted?'🔇':'🔊';
      mb.classList.toggle('on', !this.muted);
      mb.classList.toggle('off', this.muted);
    });
  }

  //--------------------------------------------------------------
  // REASSEMBLY (rebuild animation)
  //--------------------------------------------------------------
  startReassemble(){
    if(this.reassembling) return;
    if(this.fragments.length===0){
      // nothing broken — just flash reset
      this.buildLevel();
      this.audio.playChime();
      this.particles.burstDust(this.w/2,this.h*0.4,20,'rgba(180,220,255,0.6)');
      return;
    }
    this.reassembling = true;
    this.reassembleT = 0;
    for(const f of this.fragments){
      f.startX = f.x; f.startY = f.y; f.startRot = f.rotation;
    }
  }

  updateReassemble(dt){
    this.reassembleT += dt/0.7;
    const t = easeInOutCubic(clamp(this.reassembleT,0,1));
    for(const f of this.fragments){
      f.x = lerp(f.startX, f.homeX, t);
      f.y = lerp(f.startY, f.homeY, t);
      f.rotation = lerp(f.startRot, 0, t);
    }
    if(this.reassembleT>=1){
      this.reassembling = false;
      this.buildLevel();
      this.audio.playChime();
      this.particles.burstSparks(this.w/2, this.h*0.35, 24, '#bfe9ff');
      this.addShake(3);
    }
  }

  //--------------------------------------------------------------
  // SCORE / COMBO
  //--------------------------------------------------------------
  addScore(base){
    this.combo++;
    this.comboTimer = 1.3;
    const mult = 1+ (this.combo-1)*0.5;
    this.score += Math.round(base*mult);
    document.getElementById('scoreVal').textContent = this.score.toLocaleString();
    const cv = document.getElementById('comboVal');
    if(this.combo>1){
      cv.textContent = `COMBO x${this.combo}`;
      cv.classList.add('show');
    }
  }

  addShake(mag){ this.shake = Math.min(this.shake+mag, 30); }

  triggerSlowMo(){
    if(!this.slowMoEnabled) return;
    this.slowMoTimer = 0.5;
  }

  //--------------------------------------------------------------
  // MAIN LOOP
  //--------------------------------------------------------------
  loop(now){
    let dt = (now-this.lastTime)/1000;
    this.lastTime = now;
    dt = Math.min(dt,0.033);

    // fps
    this.fpsAcc += dt; this.fpsCount++;
    if(this.fpsAcc>=0.5){
      this.fpsDisplay = Math.round(this.fpsCount/this.fpsAcc);
      document.getElementById('fps').textContent = this.fpsDisplay+' FPS';
      this.fpsAcc=0; this.fpsCount=0;
    }

    // slow-mo timer counts down in REAL time
    if(this.slowMoTimer>0){
      this.slowMoTimer -= dt;
      this.timeScale = 0.3;
      if(this.slowMoTimer<=0) this.timeScale=1;
    } else {
      this.timeScale = 1;
    }
    const sdt = dt*this.timeScale;

    if(this.comboTimer>0){
      this.comboTimer -= dt;
      if(this.comboTimer<=0){
        this.combo=0;
        document.getElementById('comboVal').classList.remove('show');
      }
    }

    if(this.reassembling){
      this.updateReassemble(dt);
    } else {
      this.update(sdt, dt);
    }

    this.shake *= (1-6*dt);
    if(this.shake<0.05) this.shake=0;

    this.render();
    requestAnimationFrame(this.loop.bind(this));
  }

  update(dt, realDt){
    // projectiles
    for(let i=this.projectiles.length-1;i>=0;i--){
      const p = this.projectiles[i];
      p.update(dt, this.groundY, this.w);
      if(!p.alive){ this.projectiles.splice(i,1); continue; }
      this.checkProjectileCollisions(p);
    }

    // fragments physics
    const restitution = 0.42, floorFriction = 0.78;
    for(const f of this.fragments){
      f.update(dt, this.groundY, floorFriction, restitution, 1);
    }

    // tower block physics (unbroken but knocked)
    if(this.mode==='tower'){
      this.updateTowerBlocks(dt);
    }

    this.particles.update(dt);
  }

  updateTowerBlocks(dt){
    const blocks = this.objects;
    for(const b of blocks){
      if(!b.broken) b.update(dt, this.groundY);
    }
    // simple ground collision + shatter trigger
    for(const b of blocks){
      if(b.broken) continue;
      const restTop = this.groundY - b.h/2;
      if(b.knocked){
        // once tipped enough or falling fast and touches ground -> shatter
        if(b.y + Math.abs(Math.sin(b.rotation))*b.w/2 >= restTop-2){
          const speed = Math.hypot(b.vx,b.vy);
          if(Math.abs(b.rotation)>0.35 || speed>140){
            this.shatterBlockOnGround(b);
            this.registerBreak(6);
          } else if(b.y>restTop){
            b.y=restTop; b.vy=0;
          }
        }
      }
    }
    // topple chain: if a lower block is broken/shattered, blocks above fall
    for(let i=0;i<blocks.length;i++){
      const b = blocks[i];
      if(b.broken || b.knocked) continue;
      const below = blocks[i+1];
      if(below && below.broken){
        b.knocked = true;
        b.vx += rand(-20,20);
        b.angVel += rand(-1,1);
      }
    }
  }

  checkProjectileCollisions(p){
    if(this.mode==='pane'){
      for(const obj of this.objects){
        if(obj.broken) continue;
        if(obj.containsPoint(p.x,p.y)){
          this.hitPane(obj, p);
          return;
        }
      }
    } else if(this.mode==='tower'){
      for(const obj of this.objects){
        if(obj.broken) continue;
        if(obj.containsPoint(p.x,p.y)){
          this.hitTower(obj, p);
          return;
        }
      }
    } else {
      for(const obj of this.objects){
        if(obj.broken) continue;
        if(Math.abs(p.x-obj.x)<obj.w/2+p.radius*0.4 && Math.abs(p.y-obj.y)<obj.h/2+p.radius*0.4){
          this.hitPixel(obj, p);
        }
      }
    }
  }

  hitPane(pane, p){
    const speed = Math.hypot(p.vx,p.vy);
    this.shatterPane(pane, p.x, p.y, speed);
    this.particles.burstDust(p.x,p.y, this.quality?30:14, `hsla(${pane.hue},70%,85%,0.8)`);
    this.particles.burstSparks(p.x,p.y, this.quality?22:10, '#eaf6ff');
    this.audio.playGlassBreak(clamp(speed/700,0.5,1.6));
    this.addShake(clamp(speed/60,4,20));
    this.triggerSlowMo();
    this.registerBreak(10);
    p.vx*=0.3; p.vy*=0.3;
  }

  hitTower(block, p){
    const speed = Math.hypot(p.vx,p.vy);
    block.knocked = true;
    const hitOffset = (p.y - block.y)/ (block.h/2);
    block.vx += p.vx*0.5;
    block.vy += -Math.abs(p.vy)*0.15;
    block.angVel += clamp(p.vx*0.01,-4,4) + rand(-0.6,0.6);
    this.particles.burstSparks(p.x,p.y, this.quality?16:8, '#bfe9ff');
    this.audio.playThud(clamp(speed/500,0.4,1.4));
    this.addShake(clamp(speed/80,3,14));
    p.vx*=0.35; p.vy*=0.35;
  }

  hitPixel(obj, p){
    const speed = Math.hypot(p.vx,p.vy);
    this.shatterPixel(obj, p.x, p.y, speed*0.9);
    this.registerBreak(2);
  }

  registerBreak(baseScore){
    this.addScore(baseScore);
    const brokenAny = this.combo>0;
    if(this.combo===1){ this.audio.playCrack(); }
    // trigger big juice occasionally already handled per-call for panes/towers
    this.checkAllBroken();
  }

  checkAllBroken(){
    if(this.mode==='pixel'){
      const remaining = this.objects.filter(o=>!o.broken).length;
      if(remaining===0 && this.objects.length>0){
        this.triggerSlowMo();
        this.addShake(14);
        this.audio.playGlassBreak(1.4);
      }
    }
  }

  //--------------------------------------------------------------
  // RENDER
  //--------------------------------------------------------------
  render(){
    const ctx = this.ctx;
    ctx.clearRect(0,0,this.w,this.h);

    // background gradient
    const bg = ctx.createLinearGradient(0,0,0,this.h);
    bg.addColorStop(0,'#0c0c1e');
    bg.addColorStop(0.6,'#08081a');
    bg.addColorStop(1,'#05050b');
    ctx.fillStyle=bg;
    ctx.fillRect(0,0,this.w,this.h);

    // ambient glow blobs
    const glow1 = ctx.createRadialGradient(this.w*0.2,this.h*0.15,10,this.w*0.2,this.h*0.15,300);
    glow1.addColorStop(0,'rgba(155,107,255,0.10)');
    glow1.addColorStop(1,'rgba(155,107,255,0)');
    ctx.fillStyle=glow1; ctx.fillRect(0,0,this.w,this.h);
    const glow2 = ctx.createRadialGradient(this.w*0.85,this.h*0.25,10,this.w*0.85,this.h*0.25,320);
    glow2.addColorStop(0,'rgba(77,234,255,0.08)');
    glow2.addColorStop(1,'rgba(77,234,255,0)');
    ctx.fillStyle=glow2; ctx.fillRect(0,0,this.w,this.h);

    ctx.save();
    if(this.shake>0.1){
      ctx.translate((Math.random()-0.5)*this.shake, (Math.random()-0.5)*this.shake);
    }

    // ground
    const groundGrad = ctx.createLinearGradient(0,this.groundY,0,this.h);
    groundGrad.addColorStop(0,'rgba(70,80,140,0.35)');
    groundGrad.addColorStop(1,'rgba(10,10,20,0.9)');
    ctx.fillStyle = groundGrad;
    ctx.fillRect(0,this.groundY,this.w,this.h-this.groundY);
    ctx.strokeStyle='rgba(140,170,255,0.35)';
    ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(0,this.groundY); ctx.lineTo(this.w,this.groundY); ctx.stroke();
    // subtle grid on floor
    ctx.strokeStyle='rgba(140,170,255,0.08)';
    ctx.lineWidth=1;
    for(let gx=0; gx<this.w; gx+=40){
      ctx.beginPath(); ctx.moveTo(gx,this.groundY); ctx.lineTo(gx,this.h); ctx.stroke();
    }

    // intact objects
    const t = performance.now()/1000;
    if(this.mode==='pane'){
      for(const o of this.objects) if(!o.broken) o.drawIntact(ctx,t);
    } else if(this.mode==='tower'){
      for(const o of this.objects) if(!o.broken) o.drawIntact(ctx);
    } else {
      for(const o of this.objects){
        if(o.broken) continue;
        ctx.save();
        ctx.translate(o.x,o.y);
        const grad = ctx.createLinearGradient(-o.w/2,-o.h/2,o.w/2,o.h/2);
        grad.addColorStop(0,o.colorLight);
        grad.addColorStop(1,o.color);
        ctx.fillStyle=grad;
        ctx.fillRect(-o.w/2,-o.h/2,o.w,o.h);
        ctx.restore();
      }
    }

    // fragments
    for(const f of this.fragments) f.draw(ctx);

    // particles
    this.particles.draw(ctx);

    // projectiles
    for(const p of this.projectiles) p.draw(ctx);

    // aim line
    if(this.aiming){
      ctx.save();
      ctx.strokeStyle='rgba(77,234,255,0.7)';
      ctx.lineWidth=2;
      ctx.setLineDash([6,6]);
      ctx.beginPath();
      ctx.moveTo(this.launcher.x, this.launcher.y);
      ctx.lineTo(this.aimCurrent.x, this.aimCurrent.y);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle='rgba(77,234,255,0.9)';
      ctx.beginPath(); ctx.arc(this.launcher.x,this.launcher.y,6,0,TAU); ctx.fill();
      ctx.restore();
    }

    ctx.restore();

    // crosshair (glowing) - drawn outside shake transform for stability
    this.drawCrosshair(ctx);
  }

  drawCrosshair(ctx){
    const {x,y} = this.pointer;
    ctx.save();
    ctx.translate(x,y);
    const pulse = 1+Math.sin(performance.now()/220)*0.08;
    ctx.scale(pulse,pulse);
    ctx.shadowColor='#4deaff';
    ctx.shadowBlur=14;
    ctx.strokeStyle='rgba(77,234,255,0.9)';
    ctx.lineWidth=1.6;
    ctx.beginPath(); ctx.arc(0,0,14,0,TAU); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-20,0); ctx.lineTo(-8,0); ctx.moveTo(8,0); ctx.lineTo(20,0);
    ctx.moveTo(0,-20); ctx.lineTo(0,-8); ctx.moveTo(0,8); ctx.lineTo(0,20);
    ctx.stroke();
    ctx.fillStyle='rgba(255,255,255,0.9)';
    ctx.beginPath(); ctx.arc(0,0,2,0,TAU); ctx.fill();
    ctx.restore();
  }
}

//====================================================================
// BOOT
//====================================================================
window.addEventListener('load', ()=>{
  new Game();
});

})();
</script>
